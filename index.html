<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="Almoxarifado"/>
<meta name="theme-color" content="#5b21b6"/>
<title>Almoxarifado · Pedroni</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f0ebe0;color:#1a1a1a;min-height:100vh;}

  /* ── Header ── */
  #header{background:#fff;border-bottom:1px solid #e5e0d8;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,0.06);}
  #header .logo{display:flex;align-items:center;gap:10px;}
  #header .logo-icon{width:36px;height:36px;background:linear-gradient(135deg,#5b21b6,#7c3aed);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;}
  #header .logo-text{font-size:17px;font-weight:700;color:#1a1a1a;}
  #header .date-badge{font-size:12px;color:#16a34a;font-weight:600;display:flex;align-items:center;gap:5px;}
  #header .date-badge::before{content:"";width:7px;height:7px;border-radius:50%;background:#16a34a;display:inline-block;}

  /* ── Tabs ── */
  #tabs{background:#fff;border-bottom:1px solid #e5e0d8;padding:0 16px;display:flex;gap:0;overflow-x:auto;scrollbar-width:none;}
  #tabs::-webkit-scrollbar{display:none;}
  .tab-btn{padding:14px 16px;font-size:13px;font-weight:500;color:#6b7280;border:none;background:none;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;display:flex;align-items:center;gap:5px;transition:all .15s;}
  .tab-btn.active{color:#5b21b6;border-bottom-color:#5b21b6;font-weight:600;}
  .tab-btn:hover:not(.active){color:#374151;}

  /* ── Layout ── */
  #main{max-width:860px;margin:0 auto;padding:24px 16px 80px;}

  /* ── Cards ── */
  .card{background:#fff;border:1px solid #e5e0d8;border-radius:12px;padding:24px;margin-bottom:20px;}
  .card-title{font-size:15px;font-weight:700;color:#1a1a1a;margin-bottom:18px;display:flex;align-items:center;gap:8px;}

  /* ── Form ── */
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .form-grid .full{grid-column:1/-1;}
  .form-group{display:flex;flex-direction:column;gap:5px;}
  .form-group label{font-size:12px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:.04em;}
  .form-group input,.form-group select,.form-group textarea{
    border:1px solid #d1cdc7;border-radius:8px;padding:10px 12px;font-size:14px;color:#1a1a1a;
    background:#fff;outline:none;transition:border .15s;width:100%;font-family:inherit;}
  .form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:#7c3aed;box-shadow:0 0 0 3px rgba(124,58,237,.1);}
  .form-group input::placeholder,.form-group textarea::placeholder{color:#b0a99f;}
  .form-group textarea{resize:vertical;min-height:72px;}

  /* ── Botões ── */
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 18px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .15s;font-family:inherit;}
  .btn-primary{background:#5b21b6;color:#fff;width:100%;padding:13px;font-size:14px;border-radius:8px;margin-top:4px;}
  .btn-primary:hover{background:#4c1d95;}
  .btn-secondary{background:#fff;color:#374151;border:1px solid #d1cdc7;}
  .btn-secondary:hover{background:#f9f7f4;}
  .btn-danger{background:#fff;color:#dc2626;border:1px solid #fca5a5;}
  .btn-danger:hover{background:#fef2f2;}
  .btn-purple{background:#5b21b6;color:#fff;}
  .btn-purple:hover{background:#4c1d95;}
  .btn-green{background:#16a34a;color:#fff;}
  .btn-green:hover{background:#15803d;}
  .btn-red{background:#dc2626;color:#fff;}
  .btn-red:hover{background:#b91c1c;}
  .btn-sm{padding:7px 12px;font-size:12px;}
  .btn-full{width:100%;}

  /* ── Pills / filtros ── */
  .pills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
  .pill{padding:6px 14px;border-radius:999px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid #d1cdc7;background:#fff;color:#6b7280;transition:all .15s;}
  .pill.active{background:#5b21b6;color:#fff;border-color:#5b21b6;}
  .pill:hover:not(.active){border-color:#7c3aed;color:#5b21b6;}

  /* ── Badges ── */
  .badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:600;}
  .badge-green{background:#dcfce7;color:#16a34a;}
  .badge-yellow{background:#fef9c3;color:#a16207;}
  .badge-orange{background:#ffedd5;color:#c2410c;}
  .badge-red{background:#fee2e2;color:#dc2626;}
  .badge-blue{background:#dbeafe;color:#1d4ed8;}
  .badge-purple{background:#ede9fe;color:#5b21b6;}
  .badge-gray{background:#f3f4f6;color:#6b7280;}

  /* ── Item card ── */
  .item-card{background:#fff;border:1px solid #e5e0d8;border-radius:10px;padding:14px 16px;margin-bottom:10px;display:flex;gap:14px;align-items:flex-start;}
  .item-foto{width:60px;height:60px;border-radius:8px;object-fit:cover;flex-shrink:0;background:#f0ebe0;display:flex;align-items:center;justify-content:center;font-size:24px;}
  .item-foto img{width:60px;height:60px;border-radius:8px;object-fit:cover;}
  .item-info{flex:1;min-width:0;}
  .item-nome{font-size:14px;font-weight:700;color:#1a1a1a;margin-bottom:3px;}
  .item-meta{font-size:12px;color:#6b7280;margin-bottom:6px;display:flex;flex-wrap:wrap;gap:6px;align-items:center;}
  .item-qtd{font-size:26px;font-weight:800;line-height:1;text-align:right;}
  .item-qtd-label{font-size:11px;color:#6b7280;text-align:right;}
  .item-actions{display:flex;gap:6px;margin-top:10px;}

  /* ── Mov card ── */
  .mov-card{background:#fff;border:1px solid #e5e0d8;border-radius:10px;padding:14px 16px;margin-bottom:8px;}
  .mov-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
  .mov-nome{font-size:14px;font-weight:700;color:#1a1a1a;}
  .mov-qtd-saida{font-size:20px;font-weight:800;color:#dc2626;}
  .mov-qtd-entrada{font-size:20px;font-weight:800;color:#16a34a;}
  .mov-meta{font-size:12px;color:#6b7280;display:flex;flex-wrap:wrap;gap:8px;}
  .mov-date{font-size:11px;color:#b0a99f;margin-top:4px;}

  /* ── Alerta crítico ── */
  .alert-critico{background:#fff7ed;border:1px solid #fed7aa;border-radius:10px;padding:12px 16px;margin-bottom:14px;}
  .alert-critico p:first-child{font-size:12px;font-weight:700;color:#c2410c;margin-bottom:3px;}
  .alert-critico p:last-child{font-size:12px;color:#ea580c;}

  /* ── Stats header ── */
  .stats-row{display:flex;gap:10px;margin-bottom:20px;}
  .stat-card{flex:1;background:#fff;border:1px solid #e5e0d8;border-radius:10px;padding:14px;text-align:center;}
  .stat-num{font-size:28px;font-weight:800;color:#5b21b6;line-height:1;}
  .stat-label{font-size:11px;color:#6b7280;margin-top:3px;font-weight:500;}
  .stat-card.danger .stat-num{color:#dc2626;}

  /* ── Busca ── */
  .search-row{display:flex;gap:10px;margin-bottom:14px;}
  .search-input{flex:1;border:1px solid #d1cdc7;border-radius:8px;padding:10px 14px;font-size:14px;background:#fff;outline:none;color:#1a1a1a;}
  .search-input:focus{border-color:#7c3aed;box-shadow:0 0 0 3px rgba(124,58,237,.1);}
  .search-input::placeholder{color:#b0a99f;}

  /* ── Seção label ── */
  .section-label{font-size:11px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;}

  /* ── Responsável card ── */
  .resp-card{background:#fff;border:1px solid #e5e0d8;border-radius:10px;padding:14px 16px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;}

  /* ── Modal ── */
  #modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;}
  #modal-box{background:#fff;border-radius:14px;width:100%;max-width:520px;max-height:92vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2);}
  #modal-header{display:flex;align-items:center;justify-content:space-between;padding:18px 20px 14px;border-bottom:1px solid #e5e0d8;position:sticky;top:0;background:#fff;z-index:10;}
  #modal-header h2{font-size:16px;font-weight:700;color:#1a1a1a;}
  #modal-close{font-size:22px;color:#9ca3af;cursor:pointer;line-height:1;background:none;border:none;width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:6px;}
  #modal-close:hover{background:#f3f4f6;color:#374151;}
  #modal-body{padding:20px;}

  /* ── Item preview no modal ── */
  .item-preview-modal{background:#f9f7f4;border:1px solid #e5e0d8;border-radius:10px;padding:12px 14px;display:flex;gap:12px;align-items:center;margin-bottom:16px;}

  /* ── Foto upload ── */
  .foto-upload-btn{width:100%;height:110px;border:2px dashed #d1cdc7;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;color:#9ca3af;cursor:pointer;background:#fafaf9;transition:all .15s;}
  .foto-upload-btn:hover{border-color:#7c3aed;color:#7c3aed;}
  .foto-preview-wrap{position:relative;width:100%;height:130px;border-radius:8px;overflow:hidden;border:1px solid #e5e0d8;}
  .foto-preview-wrap img{width:100%;height:100%;object-fit:cover;}
  .foto-remove{position:absolute;top:8px;right:8px;background:#dc2626;color:#fff;border:none;border-radius:50%;width:26px;height:26px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;}

  /* ── Loading overlay ── */
  #loading-overlay{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:300;display:flex;align-items:center;justify-content:center;}
  #loading-box{background:#fff;border-radius:14px;padding:28px 40px;display:flex;flex-direction:column;align-items:center;gap:12px;box-shadow:0 20px 60px rgba(0,0,0,.2);}
  #loading-box p{font-size:14px;font-weight:600;color:#374151;}

  /* ── Vazio ── */
  .empty{text-align:center;padding:48px 16px;color:#9ca3af;}
  .empty .empty-icon{font-size:40px;margin-bottom:10px;}
  .empty p{font-size:14px;font-weight:500;}
  .empty small{font-size:12px;margin-top:4px;display:block;}

  /* ── Rel resumo ── */
  .rel-equip-card{background:#faf7ff;border:1px solid #e9d5ff;border-radius:10px;padding:12px 14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:flex-start;}
  .rel-equip-num{font-size:26px;font-weight:800;color:#5b21b6;line-height:1;}

  @media(max-width:600px){
    .form-grid{grid-template-columns:1fr;}
    .form-grid .full{grid-column:1;}
    .stats-row{gap:8px;}
    .stat-card{padding:10px;}
    .stat-num{font-size:22px;}
  }
</style>
</head>
<body>

<!-- Header -->
<div id="header">
  <div class="logo">
    <div class="logo-icon">📦</div>
    <span class="logo-text">Almoxarifado</span>
  </div>
  <div class="date-badge" id="date-badge"></div>
</div>

<!-- Tabs -->
<div id="tabs">
  <button class="tab-btn active" onclick="setTab('estoque')" id="tab-estoque">📦 Estoque</button>
  <button class="tab-btn" onclick="setTab('historico')" id="tab-historico">📋 Histórico</button>
  <button class="tab-btn" onclick="setTab('equipe')" id="tab-equipe">👥 Equipe</button>
</div>

<!-- Main -->
<div id="main"></div>

<!-- Modal -->
<div id="modal-overlay" style="display:none" onclick="if(event.target===this)fecharModal()">
  <div id="modal-box">
    <div id="modal-header">
      <h2 id="modal-title">Modal</h2>
      <button id="modal-close" onclick="fecharModal()">×</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<!-- Loading -->
<div id="loading-overlay" style="display:none">
  <div id="loading-box">
    <span style="font-size:32px">⏳</span>
    <p>Salvando...</p>
  </div>
</div>

<script type="module">
import { initializeApp }       from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, doc, updateDoc, deleteDoc,
         onSnapshot, query, orderBy, serverTimestamp }
                                from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL, deleteObject }
                                from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyD2aTKzjA3hzlAg90sQ6WAZdGkRziLrvkE",
  authDomain: "almoxarifado-pedroni.firebaseapp.com",
  databaseURL: "https://almoxarifado-pedroni-default-rtdb.firebaseio.com",
  projectId: "almoxarifado-pedroni",
  storageBucket: "almoxarifado-pedroni.firebasestorage.app",
  messagingSenderId: "320508679156",
  appId: "1:320508679156:web:c2a85b8d6f8912715a5fa1"
};
const fbApp   = initializeApp(firebaseConfig);
const db      = getFirestore(fbApp);
const storage = getStorage(fbApp);

// ── Estado ────────────────────────────────────────────────────────────────────
let itens         = [];
let movimentacoes = [];
let responsaveis  = [];
let tabAtual      = "estoque";
let busca         = "";
let filtroCategoria = "Todos";
let fotoTemp      = null;

const CATEGORIAS = ["EPI","Ferramenta","Consumível","Peça de Reposição","Elétrico","Hidráulico","Outros"];
const UNIDADES   = ["un","par","cx","kg","m","L","m²","rolo"];

// ── Helpers ───────────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const mes = ()=>new Date().toLocaleDateString("pt-BR",{month:"long",year:"numeric"}).replace(/^\w/,c=>c.toUpperCase());

const fmtDate = ts=>{
  if(!ts)return"—";
  const d=ts.toDate?ts.toDate():new Date(ts);
  return d.toLocaleDateString("pt-BR",{day:"2-digit",month:"2-digit",year:"2-digit",hour:"2-digit",minute:"2-digit"});
};
const fmtDateShort = ts=>{
  if(!ts)return"—";
  const d=ts.toDate?ts.toDate():new Date(ts);
  return d.toLocaleDateString("pt-BR",{day:"2-digit",month:"2-digit",year:"numeric"});
};

const statusItem = item=>{
  const q=Number(item.quantidade),m=Number(item.qtdMinima);
  if(q===0)    return{label:"Zerado",  cls:"badge-red"};
  if(q<=m)     return{label:"Crítico", cls:"badge-orange"};
  if(q<=m*1.5) return{label:"Baixo",   cls:"badge-yellow"};
  return            {label:"OK",      cls:"badge-green"};
};

const esc = s=>String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");

async function compressImage(file){
  return new Promise(resolve=>{
    const img=new Image(),url=URL.createObjectURL(file);
    img.onload=()=>{
      const MAX=800;let{width:w,height:h}=img;
      if(w>MAX||h>MAX){if(w>h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;}}
      const c=document.createElement("canvas");c.width=w;c.height=h;
      c.getContext("2d").drawImage(img,0,0,w,h);
      c.toBlob(b=>resolve(b),"image/jpeg",.75);URL.revokeObjectURL(url);
    };img.src=url;
  });
}

// ── Firebase listeners ────────────────────────────────────────────────────────
onSnapshot(collection(db,"itens"),snap=>{
  itens=snap.docs.map(d=>({id:d.id,...d.data()}));renderTab();
});
onSnapshot(query(collection(db,"movimentacoes"),orderBy("criadoEm","desc")),snap=>{
  movimentacoes=snap.docs.map(d=>({id:d.id,...d.data()}));renderTab();
});
onSnapshot(collection(db,"responsaveis"),snap=>{
  responsaveis=snap.docs.map(d=>({id:d.id,...d.data()}));renderTab();
});

// ── Data badge ────────────────────────────────────────────────────────────────
$("date-badge").textContent=mes();

// ── Tab switching ─────────────────────────────────────────────────────────────
window.setTab=t=>{
  tabAtual=t;busca="";filtroCategoria="Todos";
  document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
  $("tab-"+t).classList.add("active");
  renderTab();
};

function renderTab(){
  if(tabAtual==="estoque")   renderEstoque();
  else if(tabAtual==="historico") renderHistorico();
  else if(tabAtual==="equipe")    renderEquipe();
}

// ── RENDER ESTOQUE ────────────────────────────────────────────────────────────
function renderEstoque(){
  const criticos=itens.filter(i=>Number(i.quantidade)<=Number(i.qtdMinima));
  const filtrados=itens.filter(i=>{
    const mb=(i.nome||"").toLowerCase().includes(busca.toLowerCase())||(i.codigo||"").toLowerCase().includes(busca.toLowerCase());
    const mc=filtroCategoria==="Todos"||i.categoria===filtroCategoria;
    return mb&&mc;
  });

  let html=`
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-num">${itens.length}</div>
        <div class="stat-label">Itens cadastrados</div>
      </div>
      ${criticos.length?`<div class="stat-card danger">
        <div class="stat-num">${criticos.length}</div>
        <div class="stat-label">Crítico${criticos.length>1?"s":""}</div>
      </div>`:""}
      <div class="stat-card">
        <div class="stat-num">${movimentacoes.filter(m=>m.tipo==="saida").length}</div>
        <div class="stat-label">Total de saídas</div>
      </div>
    </div>

    ${criticos.length?`<div class="alert-critico">
      <p>⚠️ Estoque crítico ou zerado:</p>
      <p>${criticos.map(i=>esc(i.nome)).join(" · ")}</p>
    </div>`:""}

    <div class="search-row">
      <input class="search-input" id="inp-busca" placeholder="🔍 Buscar por nome ou código..." value="${esc(busca)}"/>
      <button class="btn btn-purple" onclick="abrirModalItem()">+ Novo Item</button>
    </div>

    <div class="section-label">Categoria</div>
    <div class="pills">
      ${["Todos",...CATEGORIAS].map(c=>`<span class="pill${filtroCategoria===c?" active":""}" onclick="setCategoria('${esc(c)}')">${c}</span>`).join("")}
    </div>

    <div class="section-label">Itens em estoque</div>
    ${filtrados.length===0?`<div class="empty"><div class="empty-icon">📦</div><p>Nenhum item encontrado</p><small>Clique em "+ Novo Item" para cadastrar</small></div>`
    :filtrados.map(item=>{
      const st=statusItem(item);
      return`<div class="item-card">
        <div class="item-foto">${item.fotoURL?`<img src="${esc(item.fotoURL)}" alt=""/>`:"📦"}</div>
        <div class="item-info">
          <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;">
            <div>
              <div class="item-nome">${esc(item.nome)}</div>
              <div class="item-meta">
                ${item.codigo?`<span>#${esc(item.codigo)}</span>`:""}
                <span class="badge badge-purple">${esc(item.categoria)}</span>
                <span class="badge ${st.cls}">${st.label}</span>
                ${item.localizacao?`<span>📍 ${esc(item.localizacao)}</span>`:""}
              </div>
              ${item.observacoes?`<div style="font-size:12px;color:#9ca3af;font-style:italic;">${esc(item.observacoes)}</div>`:""}
            </div>
            <div>
              <div class="item-qtd" style="color:${st.label==="Zerado"?"#dc2626":st.label==="Crítico"?"#c2410c":st.label==="Baixo"?"#a16207":"#1a1a1a"}">${item.quantidade}</div>
              <div class="item-qtd-label">${esc(item.unidade)}</div>
              <div class="item-qtd-label">mín ${item.qtdMinima}</div>
            </div>
          </div>
          <div class="item-actions">
            <button class="btn btn-purple btn-sm" onclick="abrirModalMov('${item.id}')">📤 Movimentar</button>
            <button class="btn btn-secondary btn-sm" onclick="abrirModalItem('${item.id}')">✏️ Editar</button>
            <button class="btn btn-danger btn-sm" onclick="deletarItem('${item.id}')">🗑️</button>
          </div>
        </div>
      </div>`;
    }).join("")}
  `;
  $("main").innerHTML=html;
  $("inp-busca").addEventListener("input",e=>{busca=e.target.value;renderEstoque();});
}

// ── RENDER HISTÓRICO ──────────────────────────────────────────────────────────
function renderHistorico(){
  let html=`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
      <div style="font-size:16px;font-weight:700;">Movimentações <span style="font-size:13px;font-weight:400;color:#6b7280;">(${movimentacoes.length})</span></div>
      <button class="btn btn-purple btn-sm" onclick="abrirModalRelatorio()">📊 Relatório</button>
    </div>
    ${movimentacoes.length===0?`<div class="empty"><div class="empty-icon">📋</div><p>Nenhuma movimentação ainda</p></div>`
    :movimentacoes.map(m=>`

window.handleFoto=async input=>{
  const file=input.files[0];if(!file)return;
  $("foto-wrap").innerHTML=`<div class="foto-upload-btn" style="cursor:default;border-color:#7c3aed;color:#7c3aed;"><span style="font-size:24px;">⏳</span><span style="font-size:13px;">Enviando...</span></div>`;
  try{
    const blob=await compressImage(file);
    const path=`itens/${Date.now()}_${file.name}`;
    await uploadBytes(ref(storage,path),blob);
    const url=await getDownloadURL(ref(storage,path));
    fotoTemp={url,path};
    $("foto-wrap").innerHTML=`<div class="foto-preview-wrap"><img src="${url}"/><button class="foto-remove" onclick="removerFoto()">×</button></div>`;
  }catch(e){alert("Erro ao enviar foto: "+e.message);$("foto-wrap").innerHTML=`<div class="foto-upload-btn" onclick="$('inp-foto').click()"><span style="font-size:28px;">📷</span><span style="font-size:13px;font-weight:500;">Tirar foto ou escolher arquivo</span></div>`;}
};

window.removerFoto=async()=>{
  if(fotoTemp?.path)try{await deleteObject(ref(storage,fotoTemp.path));}catch{}
  fotoTemp=null;
  $("foto-wrap").innerHTML=`<div class="foto-upload-btn" onclick="$('inp-foto').click()"><span style="font-size:28px;">📷</span><span style="font-size:13px;font-weight:500;">Tirar foto ou escolher arquivo</span></div>`;

window.submitMov=async itemId=>{
  const tipo=$("m-tipo")?.value;
  const resp=$("m-resp")?.value;
  const colab=$("m-colab")?.value?.trim();
  const equip=$("m-equip")?.value?.trim();
  if(!resp){alert("Selecione o responsável");return;}
  if(tipo==="saida"&&!colab){alert("Informe o colaborador");return;}
  if(tipo==="saida"&&!equip){alert("Informe o equipamento / destino");return;}
  setSalvando(true);
  const item=itens.find(i=>i.id===itemId);
  const qtd=Number($("m-qtd").value);
  let novaQtd=Number(item.quantidade);
  if(tipo==="saida")novaQtd-=qtd;
  else if(tipo==="entrada")novaQtd+=qtd;
  else novaQtd=qtd;
  if(novaQtd<0){setSalvando(false);alert("Quantidade insuficiente em estoque!");return;}
  try{
    await updateDoc(doc(db,"itens",itemId),{quantidade:novaQtd});
    await addDoc(collection(db,"movimentacoes"),{
      tipo,quantidade:qtd,responsavel:resp,colaborador:colab,equipamento:equip,
      observacao:$("m-obs")?.value?.trim()||"",
      itemId,itemNome:item.nome,itemCodigo:item.codigo||"",itemUnidade:item.unidade||"un",
      estoqueAntes:Number(item.quantidade),estoqueDepois:novaQtd,
      criadoEm:serverTimestamp()
    });
    fecharModal();
  }catch(e){alert("Erro: "+e.message);}
  setSalvando(false);
};

    equipamento:eq,totalMovimentacoes:movs.length,
    itensDiferentes:new Set(movs.map(m=>m.itemId)).size,

      <button class="btn btn-red" style="flex:1" onclick="gerarPDF()">📄 PDF</button>

  `);
};

function getFiltradas(){
  const eq=$("rel-equip")?.value||"Todos";
  const di=$("rel-inicio")?.value||"";
  const df=$("rel-fim")?.value||"";
  return movimentacoes.filter(m=>m.tipo==="saida"&&m.equipamento).filter(m=>{
    if(eq!=="Todos"&&m.equipamento!==eq)return false;
    if(di||df){
      const d=m.criadoEm?.toDate?m.criadoEm.toDate():new Date(m.criadoEm);
      if(di&&d<new Date(di))return false;
      if(df&&d>new Date(df+"T23:59:59"))return false;
    }
    return true;
  });
}

window.gerarCSV=()=>{
  const filtradas=getFiltradas();
  if(!filtradas.length){alert("Nenhum dado para exportar.");return;}
  const rows=[
    ["Data/Hora","Equipamento","Item","Código","Qtd","Unid","Colaborador","Responsável","Est.Antes","Est.Depois","Obs"],
    ...filtradas.map(m=>[fmtDate(m.criadoEm),m.equipamento,m.itemNome,m.itemCodigo||"",m.quantidade,
      m.itemUnidade||"",m.colaborador||"",m.responsavel||"",m.estoqueAntes??"",m.estoqueDepois??"",m.observacao||""])
  ];
  const csv=rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(",")).join("\n");
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"}));
  a.download=`saidas_${new Date().toISOString().slice(0,10)}.csv`;a.click();
};

window.gerarPDF=async()=>{
  const filtradas=getFiltradas();
  if(!filtradas.length){alert("Nenhum dado para exportar.");return;}
  const eq=$("rel-equip")?.value||"Todos";
  const di=$("rel-inicio")?.value||"";
  const df=$("rel-fim")?.value||"";
  await new Promise(res=>{
    if(window.jspdf){res();return;}
    const s=document.createElement("script");s.src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js";s.onload=res;document.head.appendChild(s);
  });
  await new Promise(res=>{
    if(window.jspdfAutoTable){res();return;}
    const s=document.createElement("script");s.src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js";s.onload=res;document.head.appendChild(s);
  });
  const {jsPDF}=window.jspdf;
  const pdf=new jsPDF({orientation:"landscape",unit:"mm",format:"a4"});
  const W=pdf.internal.pageSize.getWidth();
  const now=new Date().toLocaleDateString("pt-BR",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"});
  const addHeader=titulo=>{
    pdf.setFillColor(91,33,182);pdf.rect(0,0,W,18,"F");
    pdf.setTextColor(255,255,255);pdf.setFontSize(13);pdf.setFont("helvetica","bold");
    pdf.text("ALMOXARIFADO · PEDRONI",14,7);
    pdf.setFontSize(9);pdf.setFont("helvetica","normal");
    pdf.text(titulo,14,13);pdf.text(`Gerado: ${now}`,W-14,13,{align:"right"});
    pdf.setTextColor(30,30,30);
  };
  addHeader("Relatório de Saídas por Equipamento");
  const periodo=di||df?`${di?new Date(di).toLocaleDateString("pt-BR"):"início"} até ${df?new Date(df).toLocaleDateString("pt-BR"):"hoje"}`:"Todo o período";
  pdf.setFontSize(9);pdf.setTextColor(80,80,80);
  pdf.text(`Equipamento: ${eq}   |   Período: ${periodo}   |   Registros: ${filtradas.length}`,14,26);
  const agrupado=filtradas.reduce((acc,m)=>{if(!acc[m.equipamento])acc[m.equipamento]=[];acc[m.equipamento].push(m);return acc;},{});
  const resumo=Object.entries(agrupado).map(([eq2,movs])=>({equipamento:eq2,totalMovimentacoes:movs.length,itensDiferentes:new Set(movs.map(m=>m.itemId)).size,colaboradores:[...new Set(movs.map(m=>m.colaborador).filter(Boolean))],ultima:movs[0]?.criadoEm})).sort((a,b)=>b.totalMovimentacoes-a.totalMovimentacoes);
  if(resumo.length){
    pdf.setFontSize(10);pdf.setFont("helvetica","bold");pdf.setTextColor(91,33,182);
    pdf.text("RESUMO POR EQUIPAMENTO",14,34);pdf.setTextColor(30,30,30);
    pdf.autoTable({startY:37,head:[["Equipamento","Nº Saídas","Itens Diferentes","Colaboradores","Última Saída"]],
      body:resumo.map(r=>[r.equipamento,r.totalMovimentacoes,r.itensDiferentes,r.colaboradores.join(", ")||"—",fmtDateShort(r.ultima)]),
      styles:{fontSize:8,cellPadding:3},headStyles:{fillColor:[91,33,182],textColor:255,fontStyle:"bold"},
      alternateRowStyles:{fillColor:[245,243,255]},columnStyles:{1:{halign:"center"},2:{halign:"center"}},margin:{left:14,right:14}});
  }
  Object.entries(agrupado).forEach(([equip,movs])=>{
    pdf.addPage();addHeader(`Detalhamento · ${equip}`);
    pdf.setFontSize(10);pdf.setFont("helvetica","bold");pdf.setTextColor(91,33,182);
    pdf.text(`EQUIPAMENTO: ${equip.toUpperCase()}`,14,26);
    pdf.setFontSize(8);pdf.setFont("helvetica","normal");pdf.setTextColor(80,80,80);
    pdf.text(`${movs.length} saída(s)`,14,31);pdf.setTextColor(30,30,30);
    pdf.autoTable({startY:35,
      head:[["Data/Hora","Item","Cód.","Qtd.","Un.","Colaborador","Responsável","Est. Antes→Depois","Obs."]],
      body:movs.map(m=>[fmtDate(m.criadoEm),m.itemNome,m.itemCodigo||"—",m.quantidade,m.itemUnidade||"un",
        m.colaborador||"—",m.responsavel||"—",m.estoqueAntes!==undefined?`${m.estoqueAntes}→${m.estoqueDepois}`:"—",m.observacao||"—"]),
      styles:{fontSize:7.5,cellPadding:2.5,overflow:"linebreak"},
      headStyles:{fillColor:[30,30,30],textColor:255,fontStyle:"bold",fontSize:7.5},
      alternateRowStyles:{fillColor:[248,248,248]},
      columnStyles:{0:{cellWidth:28},3:{halign:"center",cellWidth:12},4:{halign:"center",cellWidth:12},7:{halign:"center",cellWidth:24}},
      margin:{left:14,right:14},didDrawPage:()=>addHeader(`Detalhamento · ${equip}`)});
  });
  const pages=pdf.internal.getNumberOfPages();
  for(let i=1;i<=pages;i++){pdf.setPage(i);pdf.setFontSize(7);pdf.setTextColor(160,160,160);
    pdf.text(`Página ${i} de ${pages}`,W/2,pdf.internal.pageSize.getHeight()-5,{align:"center"});}
  pdf.save(`relatorio_saidas_${new Date().toISOString().slice(0,10)}.pdf`);
};

renderEstoque();
</script>
</body>
